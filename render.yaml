# Render deployment configuration
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: smart-bookmark-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @smart-bookmark/db generate && pnpm --filter @smart-bookmark/api build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: smart-bookmark-postgres
          property: connectionString
      - key: WEB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
    autoDeploy: true

databases:
  - name: smart-bookmark-postgres
    databaseName: smartbookmark
    user: smartbookmark
    region: oregon
    plan: free
    ipAllowList: []
