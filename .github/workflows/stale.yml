name: Stale Issues & PRs

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday 9AM UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark Stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 7 days if no further activity occurs.
            Thank you for your contributions!
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not
            had recent activity. It will be closed in 7 days if no further activity occurs.
            Please rebase and re-push if this PR is still relevant.
          close-issue-message: 'This issue was closed because it has been stale for 7 days.'
          close-pr-message: 'This PR was closed because it has been stale for 7 days.'
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: 'pinned,security,blocked'
          exempt-pr-labels: 'pinned,security,blocked,in-progress'
